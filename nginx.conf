# HTTP -> HTTPS
server {
    listen 80;
    server_name magescam.com www.magescam.com;
    return 301 https://$host$request_uri;
}

# Kanonik alan: www -> non-www (301). Site canonical'i https://magescam.com
server {
    listen 443 ssl;
    server_name www.magescam.com;

    ssl_certificate     /etc/ssl/magescam/cert.pem;
    ssl_certificate_key /etc/ssl/magescam/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://magescam.com$request_uri;
}

server {
    listen 443 ssl;
    server_name magescam.com;

    ssl_certificate     /etc/ssl/magescam/cert.pem;
    ssl_certificate_key /etc/ssl/magescam/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /var/www/magescam;
    index index.html;

    # Bilinmeyen URL'ler için prerender edilmiş 404 sayfasını
    # gerçek 404 durum koduyla döndür (soft 404 önlenir).
    error_page 404 /404.html;

    location / {
        # flat prerender: /hakkimizda -> hakkimizda.html (redirect'siz).
        # Eşleşme yoksa gerçek 404.
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
