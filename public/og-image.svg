<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a202c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5e72e4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#825ee4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="1060" cy="120" r="260" fill="url(#accent)" opacity="0.08"/>
  <circle cx="140" cy="510" r="200" fill="url(#accent)" opacity="0.06"/>
  
  <!-- Brand name -->
  <text x="600" y="250" font-family="Roboto Slab, Georgia, serif" font-size="82" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="4">MAGES CAM</text>
  
  <!-- Tagline -->
  <text x="600" y="330" font-family="Roboto, Arial, sans-serif" font-size="34" fill="#a0aec0" text-anchor="middle" letter-spacing="2">Cama Dair Her Şey</text>
  
  <!-- Divider -->
  <rect x="500" y="370" width="200" height="3" rx="1.5" fill="#5e72e4"/>
  
  <!-- Services -->
  <text x="600" y="425" font-family="Roboto, Arial, sans-serif" font-size="22" fill="#cbd5e0" text-anchor="middle">Duşakabin · Cam · Ayna · Doğrama · Balkon</text>
  
  <!-- Location -->
  <text x="600" y="480" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#718096" text-anchor="middle">Sultanbeyli, İstanbul</text>
</svg>